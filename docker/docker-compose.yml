services:
  # ============================================================================
  # Processing Worker - Document Processing and Embedding
  # ============================================================================
  processing-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.processing-worker
      args:
        - BUILDPLATFORM=linux/arm64
        - TARGETPLATFORM=linux/arm64
        - PYTHON_VERSION=3.10
    container_name: docusearch-worker
    volumes:
      - ../data/uploads:/uploads:ro
      - ../data/models:/models
      - ../data/logs:/data/logs
      - ../data/page_images:/page_images
      - ../src:/app/src
    environment:
      # Koji database
      - KOJI_DB_PATH=${KOJI_DB_PATH:-/data/koji.db}
      # Shikomi embedding service
      - SHIKOMI_GRPC_TARGET=${SHIKOMI_GRPC_TARGET:-host.docker.internal:50051}
      - SHIKOMI_USE_MOCK=${SHIKOMI_USE_MOCK:-false}
      # Processing configuration
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-100}
      - SUPPORTED_FORMATS=${SUPPORTED_FORMATS:-pdf,docx,pptx,xlsx,html,xhtml,md,asciidoc,csv,mp3,wav,vtt,png,jpg,jpeg,tiff,bmp,webp}
      - TEXT_CHUNK_SIZE=${TEXT_CHUNK_SIZE:-250}
      - TEXT_CHUNK_OVERLAP=${TEXT_CHUNK_OVERLAP:-50}
      - PAGE_RENDER_DPI=${PAGE_RENDER_DPI:-150}
      # ASR (Whisper) configuration
      - ASR_ENABLED=${ASR_ENABLED:-true}
      - ASR_MODEL=${ASR_MODEL:-turbo}
      - ASR_LANGUAGE=${ASR_LANGUAGE:-en}
      - ASR_DEVICE=${ASR_DEVICE:-mps}
      - ASR_WORD_TIMESTAMPS=${ASR_WORD_TIMESTAMPS:-true}
      - ASR_TEMPERATURE=${ASR_TEMPERATURE:-0.0}
      - ASR_MAX_TIME_CHUNK=${ASR_MAX_TIME_CHUNK:-30.0}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_FILE=/data/logs/worker.log
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - docusearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "python3", "-c", "import koji; print('Koji OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

# ============================================================================
# Networks
# ============================================================================
networks:
  docusearch:
    driver: bridge
    name: docusearch-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  koji_data:
    driver: local
  model_cache:
    driver: local
